name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Pack extension
        shell: pwsh
        run: Compress-Archive -Path extension/* -DestinationPath release/HTK-Bridge-0.1.0.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: HTKstudio-Windows
          path: |
            release/*.exe
            release/*.zip
            release/*.yml
